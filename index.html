<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Dice Roller (Physics)</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>3D Dice Roller</h1>
      <p class="result" id="result">結果: -</p>
      <div class="scene" id="scene" aria-label="物理演算ダイスの表示"></div>
      <div class="controls">
        <label for="diceCount">ダイス数</label>
        <input id="diceCount" type="number" min="1" max="10" value="1" />

        <label for="soundVolume">効果音</label>
        <input id="soundVolume" type="range" min="0" max="100" step="1" value="80" />
        <span id="soundVolumeValue" class="value-label">80%</span>

        <button id="rollButton" type="button">転がす</button>
        <button id="wallTransparencyToggle" type="button">壁: 透過OFF</button>
      </div>
    </main>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.161.0/build/three.module.js"
        }
      }
    </script>

    <script type="module" src="script.js"></script>
  </body>
</html>
